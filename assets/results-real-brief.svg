<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 456" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Fine-tuned vs. prompted baseline on real briefs</title>
  <desc id="desc">Grouped bar chart. Macro F1: baseline 0.69, fine-tuned 0.83. Accurate recall: baseline 0.45, fine-tuned 0.80. Mischaracterized recall: baseline 0.97, fine-tuned 0.86.</desc>

  <rect x="0.5" y="0.5" width="759" height="455" rx="12" fill="#ffffff" stroke="#e1e0d9"/>

  <text x="40" y="42" font-size="20" font-weight="500" fill="#0b0b0b">Fine-tuning vs. prompted baseline on real briefs</text>

  <rect x="40" y="60" width="12" height="12" rx="2" fill="#7FB0E6"/>
  <text x="58" y="70" font-size="13" fill="#52514e">Prompted baseline (12B)</text>
  <rect x="240" y="60" width="12" height="12" rx="2" fill="#2a78d6"/>
  <text x="258" y="70" font-size="13" fill="#52514e">Fine-tuned (12B)</text>

  <g stroke="#e1e0d9" stroke-width="1">
    <line x1="80" y1="110" x2="720" y2="110"/>
    <line x1="80" y1="164" x2="720" y2="164"/>
    <line x1="80" y1="218" x2="720" y2="218"/>
    <line x1="80" y1="272" x2="720" y2="272"/>
    <line x1="80" y1="326" x2="720" y2="326"/>
  </g>
  <line x1="80" y1="380" x2="720" y2="380" stroke="#c3c2b7" stroke-width="1"/>

  <g font-size="12" fill="#898781" text-anchor="end">
    <text x="58" y="114">1.0</text>
    <text x="58" y="168">0.8</text>
    <text x="58" y="222">0.6</text>
    <text x="58" y="276">0.4</text>
    <text x="58" y="330">0.2</text>
    <text x="58" y="384">0.0</text>
  </g>

  <g>
    <rect x="145" y="193" width="46" height="187" rx="3" fill="#7FB0E6"/>
    <rect x="199" y="156" width="46" height="224" rx="3" fill="#2a78d6"/>
    <rect x="355" y="259" width="46" height="121" rx="3" fill="#7FB0E6"/>
    <rect x="409" y="165" width="46" height="215" rx="3" fill="#2a78d6"/>
    <rect x="565" y="118" width="46" height="262" rx="3" fill="#7FB0E6"/>
    <rect x="619" y="148" width="46" height="232" rx="3" fill="#2a78d6"/>
  </g>

  <g font-size="12" font-weight="500" fill="#0b0b0b" text-anchor="middle">
    <text x="168" y="185">0.69</text>
    <text x="222" y="148">0.83</text>
    <text x="378" y="251">0.45</text>
    <text x="432" y="157">0.80</text>
    <text x="588" y="110">0.97</text>
    <text x="642" y="140">0.86</text>
  </g>

  <g font-size="13" fill="#0b0b0b" text-anchor="middle">
    <text x="195" y="402">Macro F1</text>
    <text x="405" y="402">Accurate recall</text>
    <text x="615" y="402">Mischaracterized recall</text>
  </g>

  <text x="40" y="438" font-size="11.5" fill="#898781">Held-out set of 189 real-brief citations; both models scored on the same 141 resolved examples.</text>
</svg>
